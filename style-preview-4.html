<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Style 4 - Warm & Cozy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(160deg, #f5ebe0, #e8d5c4, #d4b896);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255, 252, 248, 0.92);
      border-radius: 4px;
      padding: 44px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(139, 90, 43, 0.15), 0 2px 8px rgba(139, 90, 43, 0.1);
      border-top: 4px solid #8b5a2b;
    }
    .badge {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8b5a2b;
      margin-bottom: 20px;
      font-weight: 600;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #3d2b1f;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .subtitle {
      color: #a07850;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      margin-bottom: 32px;
    }
    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .progress-bar {
      flex: 1;
      height: 4px;
      background: #e8d5c4;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill { width: 40%; height: 100%; background: #8b5a2b; border-radius: 2px; }
    .progress-text {
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      color: #a07850;
    }
    .question {
      font-size: 21px;
      color: #3d2b1f;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .option {
      background: rgba(255, 248, 240, 0.8);
      border: 1.5px solid #e0c9b0;
      border-radius: 8px;
      padding: 15px 18px;
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #5c3d26;
      font-size: 14px;
      font-family: 'Segoe UI', sans-serif;
      transition: all 0.2s;
    }
    .option:hover { border-color: #8b5a2b; background: rgba(255, 245, 235, 0.9); }
    .option.selected { border-color: #8b5a2b; background: rgba(139, 90, 43, 0.08); color: #3d2b1f; font-weight: 600; }
    .dot { width: 8px; height: 8px; border-radius: 50%; border: 2px solid #c4956a; min-width: 8px; }
    .option.selected .dot { background: #8b5a2b; border-color: #8b5a2b; }
    .style-label {
      text-align: center;
      margin-top: 28px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #c4b0a0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">☕ Coffee Personality Quiz</div>
    <h1>What's Your Coffee Personality?</h1>
    <p class="subtitle">5 questions · about 2 minutes</p>
    <div class="progress">
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <span class="progress-text">2 of 5</span>
    </div>
    <p class="question">You find a mysterious door.<br>What's behind it?</p>
    <div class="option"><div class="dot"></div> A volcano — let's see what happens</div>
    <div class="option selected"><div class="dot"></div> A cozy reading nook with tea</div>
    <div class="option"><div class="dot"></div> A giant dessert buffet</div>
    <div class="option"><div class="dot"></div> A peaceful zen garden</div>
    <div class="style-label">Style 4 — Warm & Cozy</div>
  </div>
</body>
</html>
